services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: internal-requests-backend
    environment:
      APP_NAME: Internal Requests
      APP_ENV: production
      DATABASE_URL: sqlite:///./data/app.db
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      BACKEND_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      RATE_LIMIT_DEFAULT: 100/minute
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
    container_name: internal-requests-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
