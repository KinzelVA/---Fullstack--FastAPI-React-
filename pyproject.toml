[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["."]
addopts = "-ra"
filterwarnings = [
    "ignore:Using `httpx` with `starlette.testclient` is deprecated.*:Warning"
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.mypy]
python_version = "3.12"
plugins = []
ignore_missing_imports = true
strict = false